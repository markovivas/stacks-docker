services:

  broker:
    image: docker.io/library/redis:7
    container_name: paperless-broker
    restart: unless-stopped
    volumes:
      - redisdata:/data

  webserver:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless-webserver
    restart: unless-stopped
    depends_on:
      - broker
    ports:
      - "8000:8000"
    volumes:
      - localdata:/usr/src/paperless/data
      - localmedia:/usr/src/paperless/media
      - ./export:/usr/src/paperless/export
      - ./consume:/usr/src/paperless/consume
    environment:
      PAPERLESS_REDIS: redis://broker:6379
      PAPERLESS_TIME_ZONE: "America/Sao_Paulo"
      PAPERLESS_OCR_LANGUAGE: "eng"
      PAPERLESS_SECRET_KEY: "mude-esse-segredo-para-uma-chave-longa-e-aleatoria"

volumes:
  redisdata:
  localdata:
  localmedia:



# ================================
# Pastas utilizadas
# ================================
#
# ./export
# → Exportações de documentos
#
# ./consume
# → Coloque arquivos aqui para
#   o Paperless processar
#
# As pastas redisdata, localdata e
# localmedia são gerenciadas pelo
# Docker (named volumes).
#
# ================================



# ================================
# Acesso ao Paperless-ngx
# ================================
#
# URL:
# http://localhost:8000
#
# Primeiro acesso:
#
# 1 - Crie o usuário administrador:
# docker exec -it paperless-webserver \
# python manage.py createsuperuser
#
# 2 - Acesse:
# http://localhost:8000
#
# 3 - Coloque documentos na pasta:
# ./consume/
#
# O Paperless irá processar automaticamente.
#
# ================================
