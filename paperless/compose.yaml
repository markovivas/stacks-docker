version: "3.9"

services:

  paperless-db:
    image: postgres:16
    container_name: paperless-db
    restart: unless-stopped

    environment:
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: paperless_password_change_me
      POSTGRES_DB: paperless

    volumes:
      - ./volumes/database:/var/lib/postgresql/data

    healthcheck:
      test: pg_isready -U paperless --dbname paperless
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - paperless-network

  paperless-broker:
    image: redis:7-alpine
    container_name: paperless-broker
    restart: unless-stopped

    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - paperless-network

  paperless-webserver:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless-webserver
    restart: unless-stopped

    ports:
      - "8000:8000"

    environment:
      PAPERLESS_REDIS: redis://paperless-broker:6379
      PAPERLESS_DBHOST: paperless-db
      PAPERLESS_DBUSER: paperless
      PAPERLESS_DBPASS: paperless_password_change_me
      PAPERLESS_DBNAME: paperless
      PAPERLESS_SECRET_KEY: change_me_to_a_random_secret_key
      PAPERLESS_URL: http://localhost:8000
      PAPERLESS_TIME_ZONE: America/Sao_Paulo
      PAPERLESS_OCR_LANGUAGE: por
      PAPERLESS_CONSUMPTION_DIR: /usr/src/paperless/consume

    volumes:
      - ./volumes/data:/usr/src/paperless/data
      - ./volumes/media:/usr/src/paperless/media
      - ./volumes/consume:/usr/src/paperless/consume
      - ./volumes/export:/usr/src/paperless/export

    depends_on:
      paperless-db:
        condition: service_healthy
      paperless-broker:
        condition: service_healthy

    networks:
      - paperless-network

networks:
  paperless-network:
    driver: bridge



# ================================
# Pastas utilizadas
# ================================
#
# ./volumes
# → Armazena todos os dados:
#    - database/  → PostgreSQL
#    - data/      → Configurações e cache
#    - media/     → Documentos processados
#    - consume/   → Pasta para arquivos novos
#    - export/    → Exportações
#
# Todas as pastas serão criadas automaticamente.
#
# Faça backup principalmente de:
# ./volumes/database
# ./volumes/data
# ./volumes/media
#
# ================================



# ================================
# Acesso ao Paperless-ngx
# ================================
#
# URL:
# http://localhost:8000
#
# Primeiro acesso:
#
# 1 - Crie o usuário administrador:
# docker exec -it paperless-webserver \
# python manage.py createsuperuser
#
# 2 - Acesse:
# http://localhost:8000
#
# 3 - Coloque documentos na pasta:
# ./volumes/consume/
#
# O Paperless irá processar automaticamente.
#
# ================================
