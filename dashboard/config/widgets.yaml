- search:
    provider: google
    focus: true
    showOptional: true

- docker:
    label: Docker Status
    server: homelab
    container_names: true

- resources:
    label: Sistema
    expanded: false
    cpu: true
    memory: true
    disk: /
    uptime: true
    temp: true
    refresh: 10000

- datetime:
    locale: pt-BR
    text_size: md
    icon: calendar
    hour12: false
    format:
      weekday: long
      day: numeric
      month: long
      hour: numeric
      minute: numeric
