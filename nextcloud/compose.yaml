version: '3.8'

services:
  db:
    image: mariadb:11.4
    container_name: nextcloud-db
    restart: unless-stopped
    command:
      - --transaction-isolation=READ-COMMITTED
      - --binlog-format=ROW
      - --innodb-read-only-compressed=OFF
    environment:
      MYSQL_ROOT_PASSWORD: root_password_change_me
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: nextcloud_password_change_me
    volumes:
      - ./volumes/db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - nextcloud-network

  redis:
    image: redis:7-alpine
    container_name: nextcloud-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ./volumes/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - nextcloud-network

  app:
    image: nextcloud:30-apache
    container_name: nextcloud-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: nextcloud_password_change_me
      REDIS_HOST: redis
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: admin_password_change_me
      NEXTCLOUD_TRUSTED_DOMAINS: localhost
      PHP_MEMORY_LIMIT: 512M
      PHP_UPLOAD_LIMIT: 2G
    volumes:
      - ./volumes/nextcloud/html:/var/www/html
      - ./volumes/nextcloud/config:/var/www/html/config
      - ./volumes/nextcloud/data:/var/www/html/data
      - ./volumes/nextcloud/custom_apps:/var/www/html/custom_apps
      - ./volumes/nextcloud/themes:/var/www/html/themes
    networks:
      - nextcloud-network

  onlyoffice:
    image: onlyoffice/documentserver:8.3
    container_name: onlyoffice-documentserver
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "8081:80"
    environment:
      JWT_ENABLED: true
      JWT_SECRET: your_jwt_secret_change_me
      JWT_HEADER: AuthorizationJwt
    volumes:
      - ./volumes/onlyoffice/data:/var/www/onlyoffice/Data
      - ./volumes/onlyoffice/logs:/var/log/onlyoffice
      - ./volumes/onlyoffice/lib:/var/lib/onlyoffice
      - ./volumes/onlyoffice/db:/var/lib/postgresql
    networks:
      - nextcloud-network

networks:
  nextcloud-network:
    driver: bridge