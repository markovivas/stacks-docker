services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    volumes:
      - ./data:/data
    environment:
      SIGNUPS_ALLOWED: "true"
      DOMAIN: "https://localhost"
      ADMIN_TOKEN: "jgUkQlvuwdqne8fWYPR2CiLAB960GDoS"
      ICON_CACHE_TTL: "0"
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/ssl:ro
    networks:
      - internal

networks:
  internal:
    driver: bridge



# ================================
# Pastas utilizadas
# ================================
#
# ./data
# → Dados do Vaultwarden
#   (senhas, configurações, anexos)
#
# ./nginx
# → Configuração do proxy Nginx
#
# ./ssl
# → Certificados SSL
#
# Faça backup de:
# ./data
#
# ================================



# ================================
# Acesso ao Vaultwarden
# ================================
#
# URL:
# https://localhost
#
# Admin:
# https://localhost/admin
#
# Container:
# - vaultwarden (backend)
# - nginx-proxy (proxy reverso HTTPS)
#
# ================================
