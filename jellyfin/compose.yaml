services:

  # ================================
  # Jellyfin
  # ================================
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped

    ports:
      - "8096:8096"

    environment:
      TZ: America/Sao_Paulo

    volumes:
      - ./config:/config
      - ./cache:/cache
      - ./media:/media

  # ================================
  # qBittorrent
  # ================================
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped

    ports:
      - "8080:8080"       # WebUI
      - "6881:6881/tcp"   # BitTorrent
      - "6881:6881/udp"   # DHT/UDP

    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/Sao_Paulo
      WEBUI_PORT: 8080
      UMASK: "022"

    volumes:
      - ./qbittorrent/config:/config
      - ./media/qBittorrent:/downloads



# ================================
# Estrutura de Pastas
# ================================
#
# .
# ├── compose.yaml
# ├── cache/
# ├── config/
# ├── media/
# │   ├── Filmes/
# │   ├── Series/
# │   ├── Musicas/
# │   ├── Videos/
# │   └── qBittorrent/
# └── qbittorrent/
#     └── config/
#
# ================================



# ================================
# Acesso
# ================================
#
# Jellyfin:
# http://localhost:8096
#
# qBittorrent:
# http://localhost:8080
# Usuário: admin
# Senha: veja os logs:
# docker logs -f qbittorrent
#
# ================================
