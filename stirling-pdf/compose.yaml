services:

  stirling-pdf:
    image: stirlingtools/stirling-pdf:latest
    container_name: stirling-pdf
    restart: unless-stopped

    ports:
      - "8090:8080"

    volumes:
      - ./volumes/training-data:/usr/share/tesseract-ocr/4.00/tessdata
      - ./volumes/extra-configs:/configs
      - ./volumes/custom-files:/customFiles

    environment:
      DOCKER_ENABLE_SECURITY: "false"
      INSTALL_BOOK_AND_ADVANCED_HTML_OPS: "false"
      LANGS: pt-BR




# ================================
# Pastas utilizadas
# ================================
#
# ./volumes
# → Armazena dados do Stirling PDF:
#    - training-data/ → Dados OCR (Tesseract)
#    - extra-configs/ → Configurações
#    - custom-files/  → Arquivos personalizados
#
# Todas as pastas serão criadas automaticamente.
#
# ================================



# ================================
# Acesso ao Stirling PDF
# ================================
#
# URL:
# http://localhost:8090
#
# Funcionalidades:
# - Dividir / Unir PDFs
# - Converter PDF para Word, Excel, imagem
# - Comprimir PDF
# - OCR em PDFs escaneados
# - Extrair / remover páginas
# - Assinar digitalmente
# - E muito mais...
#
# ================================
