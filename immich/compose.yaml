services:

  immich-server:
    container_name: immich-server
    image: ghcr.io/immich-app/immich-server:release
    restart: unless-stopped

    depends_on:
      - immich-database

    ports:
      - "2283:2283"

    environment:
      TZ: America/Sao_Paulo
      DB_HOSTNAME: immich-database
      DB_USERNAME: immich
      DB_PASSWORD: immich_password_change_me
      DB_DATABASE_NAME: immich

    volumes:
      - ./volumes/upload:/usr/src/app/upload
      - ./volumes/profile:/usr/src/app/upload/profile
      - ./volumes/thumbs:/usr/src/app/upload/thumbs
      - ./volumes/encoded-video:/usr/src/app/upload/encoded-video

  immich-machine-learning:
    container_name: immich-machine-learning
    image: ghcr.io/immich-app/immich-machine-learning:release
    restart: unless-stopped

    volumes:
      - ./volumes/model-cache:/cache

  immich-database:
    container_name: immich-database
    image: tensorchord/pgvecto-rs:pg14-v0.2.0
    restart: unless-stopped

    environment:
      POSTGRES_USER: immich
      POSTGRES_PASSWORD: immich_password_change_me
      POSTGRES_DB: immich

    volumes:
      - ./volumes/database:/var/lib/postgresql/data

networks:
  default:
    name: immich-network


# ================================
# Pastas utilizadas
# ================================
#
# ./volumes
# → Armazena todos os dados:
#    - database/  → PostgreSQL
#    - upload/    → Fotos e vídeos originais
#    - profile/   → Fotos de perfil
#    - thumbs/    → Miniaturas
#    - encoded-video/ → Vídeos transcodificados
#    - model-cache/   → Cache ML
#
# Todas as pastas serão criadas automaticamente.
#
# Faça backup principalmente de:
# ./volumes/database
# ./volumes/upload
#
# ================================



# ================================
# Acesso ao Immich
# ================================
#
# URL:
# http://localhost:2283
#
# Primeiro acesso:
#
# 1 - Abra o navegador em:
# http://localhost:2283
#
# 2 - Crie o usuário administrador
#
# 3 - Comece a fazer upload das fotos
#
# ================================
